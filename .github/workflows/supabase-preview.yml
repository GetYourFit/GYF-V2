name: Supabase Preview

# GYF owns schema changes in Alembic (services/api/db/migrations), not in a second
# supabase/migrations tree. This workflow is the adapter: every PR proves the full
# migration chain against disposable Postgres, and — when optional Supabase
# credentials exist — applies the same chain to that PR's isolated branch.
# Production is never a target of this workflow.

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  migration-contract:
    name: Supabase Preview
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gyf
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      GYF_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gyf
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.12
      - run: uv sync --extra dev --extra postgres --extra migrate --extra otel --extra sentry
      - name: Apply the complete Alembic chain
        run: GYF_DATABASE_URL="$GYF_TEST_DATABASE_URL" uv run alembic upgrade head
      - name: Run API regression suite against preview schema
        run: uv run pytest -q

  remote-branch:
    name: Apply Alembic to Supabase branch
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    environment: EXPO_TOKEN
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      PREVIEW_BRANCH: pr-${{ github.event.pull_request.number }}
    steps:
      - name: Check optional remote preview configuration
        id: gate
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Remote Supabase preview is disabled: configure SUPABASE_ACCESS_TOKEN (secret) and SUPABASE_PROJECT_REF (variable) in the EXPO_TOKEN environment." >&2
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.gate.outputs.enabled == 'true'
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: supabase/setup-cli@v1
        if: steps.gate.outputs.enabled == 'true'
        with:
          version: latest
      - name: Create or reuse isolated preview branch
        if: steps.gate.outputs.enabled == 'true'
        run: |
          if ! supabase --experimental branches get "$PREVIEW_BRANCH" --project-ref "$SUPABASE_PROJECT_REF" >/dev/null 2>&1; then
            supabase --experimental branches create "$PREVIEW_BRANCH" --project-ref "$SUPABASE_PROJECT_REF"
          fi
          supabase --experimental branches get "$PREVIEW_BRANCH" -o env >> "$GITHUB_ENV"
          unset SUPABASE_ACCESS_TOKEN
      - uses: astral-sh/setup-uv@v3
        if: steps.gate.outputs.enabled == 'true'
      - name: Apply the same Alembic chain to the isolated branch
        if: steps.gate.outputs.enabled == 'true'
        working-directory: services/api
        run: |
          : "${POSTGRES_URL_NON_POOLING:?Supabase preview did not return a non-pooling database URL}"
          uv python install 3.12
          uv sync --extra postgres --extra migrate
          GYF_DATABASE_URL="$POSTGRES_URL_NON_POOLING" uv run alembic upgrade head

  cleanup-remote-branch:
    name: Delete Supabase preview branch
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    environment: EXPO_TOKEN
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
      PREVIEW_BRANCH: pr-${{ github.event.pull_request.number }}
    steps:
      - name: Check optional remote preview configuration
        id: gate
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Remote Supabase preview is not configured; nothing to clean up."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: supabase/setup-cli@v1
        if: steps.gate.outputs.enabled == 'true'
        with:
          version: latest
      - name: Delete isolated branch
        if: steps.gate.outputs.enabled == 'true'
        run: supabase --experimental branches delete "$PREVIEW_BRANCH" --project-ref "$SUPABASE_PROJECT_REF"
