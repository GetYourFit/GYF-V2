# Keep the free-tier API host and its lazy-loaded text embedder warm.
#
# Render free instances spin down after ~15 min idle; the first request then
# pays a cold boot (and the first search additionally pays encoder init) —
# the 2.8–10s Explore latency variance observed on prod. Two cheap probes
# every 10 minutes keep both hot. ponytail: cron ping, not paid always-on —
# upgrade the Render plan if real traffic ever makes this redundant.
name: keep-warm

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: health (wakes the host)
        run: curl -sf --max-time 60 https://gyf-api.onrender.com/health
      - name: tiny search (warms the text embedder)
        run: curl -sf --max-time 90 "https://gyf-api.onrender.com/items/search?q=shirt&k=1" > /dev/null
