name: CD

# Continuous delivery. Runs only after CI succeeds on main.
# Deploys the web to Cloudflare Workers via the wrangler CLI (OpenNext adapter).
# CLI/token deploy means the private repo needs no third-party Git OAuth.
# The API ships separately on Render from render.yaml.
#
# The deploy step is guarded: it no-ops gracefully until the Cloudflare secrets
# are set, so the pipeline is green from day one and "turns on" once configured.
#
# Required repo secrets:
#   CLOUDFLARE_API_TOKEN  — token with the "Edit Cloudflare Workers" template
#   CLOUDFLARE_ACCOUNT_ID — Cloudflare account id
# Required repo variables (NEXT_PUBLIC_* are inlined into the build):
#   NEXT_PUBLIC_API_URL, NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: cd-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  deploy-web:
    name: Deploy web (Cloudflare Workers)
    runs-on: ubuntu-latest
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'main' }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.30"

      - name: Check secrets
        id: gate
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Cloudflare secrets not set — skipping deploy (set CLOUDFLARE_API_TOKEN/ACCOUNT_ID)."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install deps
        if: steps.gate.outputs.enabled == 'true'
        run: bun install --frozen-lockfile

      - name: Build & deploy
        if: steps.gate.outputs.enabled == 'true'
        working-directory: app
        run: bun run cf:deploy
