name: CD

# Continuous delivery. Runs only after CI succeeds on main.
# Deploys the web to Vercel (project gyf-v2-app) via the Vercel CLI.
# Expo web deploys to EAS Hosting from this workflow; native builds use `apps/expo/eas.json`.
# CLI/token deploy means the private repo needs no third-party Git OAuth.
# The API ships separately on Render from render.yaml.
#
# The deploy step is guarded: it no-ops gracefully until the Vercel secrets
# are set, so the pipeline is green from day one and "turns on" once configured.
# It also skips when the commit touches nothing this app depends on (app/, packages/,
# root package.json/bun.lock) — deploying on every unrelated commit exhausted Vercel's
# free-tier daily upload quota (2026-07-18 incident).
#
# Required GitHub environment secrets (the jobs bind to environment `EXPO_TOKEN`):
#   VERCEL_TOKEN      — a Vercel access token (Account Settings → Tokens)
#   VERCEL_ORG_ID     — Vercel team/org id (.vercel/project.json → orgId)
#   VERCEL_PROJECT_ID — Vercel project id  (.vercel/project.json → projectId)
# Expo production web additionally requires `EXPO_TOKEN`, public API/Supabase variables, and the
# Supabase anon/publishable key configured in GitHub Actions; native store credentials stay in EAS.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: cd-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  deploy-web:
    name: Deploy web (Vercel)
    environment: EXPO_TOKEN
    runs-on: ubuntu-latest
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'main' }}
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2

      - name: Check secrets
        id: gate
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Vercel secrets not set — skipping deploy (set VERCEL_TOKEN/ORG_ID/PROJECT_ID)."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      # Every push to main previously redeployed this unrelated Next.js oracle, exhausting the
      # Vercel free-tier daily upload quota ("more than 5000, code: api-upload-free") and turning
      # CD red on unrelated Expo/API/docs commits. Skip when nothing this app depends on changed.
      - name: Check changed paths
        id: paths
        run: |
          if ! git diff --name-only HEAD^ HEAD > /tmp/changed.txt 2>/tmp/diff-error.txt; then
            echo "Could not diff against parent commit ($(cat /tmp/diff-error.txt)); deploying to be safe."
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          elif grep -qE '^(app/|packages/|package\.json$|bun\.lock$|\.github/workflows/cd\.yml$)' /tmp/changed.txt; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "No app/, packages/ or workspace lockfile changes — skipping Vercel deploy."
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Bun
        if: steps.gate.outputs.enabled == 'true' && steps.paths.outputs.relevant == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Deploy to Vercel (production)
        if: steps.gate.outputs.enabled == 'true' && steps.paths.outputs.relevant == 'true'
        run: |
          npm i -g vercel@latest
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

  deploy-expo-web:
    name: Deploy Expo web (EAS Hosting)
    environment: EXPO_TOKEN
    runs-on: ubuntu-latest
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.head_branch == 'main' }}
    defaults:
      run:
        working-directory: apps/expo
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL }}
      EXPO_PUBLIC_SUPABASE_URL: ${{ vars.EXPO_PUBLIC_SUPABASE_URL }}
      EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Check EAS configuration
        id: gate
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "EXPO_TOKEN is not configured; Expo production deploy is not enabled." >&2
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          elif [ -z "$EXPO_PUBLIC_API_URL" ] || [ -z "$EXPO_PUBLIC_SUPABASE_URL" ] || [ -z "$EXPO_PUBLIC_SUPABASE_ANON_KEY" ]; then
            echo "Expo public production environment is incomplete." >&2
            exit 1
          elif [[ "$EXPO_PUBLIC_API_URL" != https://* ]] || [[ "$EXPO_PUBLIC_SUPABASE_URL" != https://* ]]; then
            echo "Expo API and Supabase URLs must use HTTPS." >&2
            exit 1
          elif [[ "$EXPO_PUBLIC_SUPABASE_ANON_KEY" != sb_publishable_?* ]]; then
            echo "Expo requires a current Supabase publishable key; refusing a legacy anon JWT." >&2
            exit 1
          else
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install workspace dependencies
        working-directory: ${{ github.workspace }}
        run: bun install --frozen-lockfile

      - name: Deploy Expo web to EAS Hosting
        if: steps.gate.outputs.enabled == 'true'
        run: |
          npx expo export --platform web --clear
          if ! grep -R -F -- "$EXPO_PUBLIC_SUPABASE_URL" dist >/dev/null; then
            echo "Expo bundle does not contain configured Supabase URL; refusing deploy." >&2
            exit 1
          fi
          if ! grep -R -F -- "$EXPO_PUBLIC_API_URL" dist >/dev/null; then
            echo "Expo bundle does not contain configured API URL; refusing deploy." >&2
            exit 1
          fi
          if ! grep -R -F -- "$EXPO_PUBLIC_SUPABASE_ANON_KEY" dist >/dev/null; then
            echo "Expo bundle does not contain configured Supabase publishable key; refusing deploy." >&2
            exit 1
          fi
          if grep -R -F -- 'eyJhbGciOiJIUzI1Ni' dist >/dev/null; then
            echo "Expo bundle contains a legacy Supabase JWT; refusing deploy." >&2
            exit 1
          fi
          npm exec --yes eas-cli@latest -- deploy --prod --non-interactive --dev-domain=get-your-fit
