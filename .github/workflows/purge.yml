name: Account purge

# Right-to-erasure, second half (F2): DELETE /account tombstones immediately;
# this nightly job hard-deletes every account whose tombstone is older than the
# grace window (app.profile.purge — idempotent, safe to re-run). Without a
# scheduled runner the erasure promise is only half-kept.
#
# Guarded like CD/data-export: no-ops gracefully until the
# GYF_PROD_DATABASE_URL repo secret is set (it already is for data-export).

on:
  schedule:
    - cron: "0 22 * * *" # nightly, 03:30 IST — before the 22:30 data export
  workflow_dispatch:

permissions:
  contents: read

jobs:
  purge:
    name: Hard-delete tombstones past the grace window
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check secret configured
        id: gate
        env:
          DSN: ${{ secrets.GYF_PROD_DATABASE_URL }}
        run: |
          if [ -z "$DSN" ]; then
            echo "GYF_PROD_DATABASE_URL not set — skipping (set the repo secret to activate)."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: astral-sh/setup-uv@v5
        if: steps.gate.outputs.configured == 'true'
        with:
          python-version: "3.12"

      # A purged account's avatar lives in a public Supabase Storage bucket, outside the
      # database cascade, and its RLS is scoped to auth.uid() — so an erased account has
      # no token left to delete its own image. Erasure needs the service-role key here or
      # the job defers every account that has one (keeping the tombstone) and exits
      # non-zero rather than half-erasing it. Accounts with no avatar purge regardless.
      - name: Purge expired tombstones
        if: steps.gate.outputs.configured == 'true'
        working-directory: services/api
        env:
          GYF_DATABASE_URL: ${{ secrets.GYF_PROD_DATABASE_URL }}
          GYF_SUPABASE_URL: ${{ secrets.GYF_SUPABASE_URL }}
          GYF_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.GYF_SUPABASE_SERVICE_ROLE_KEY }}
        run: uv run --extra postgres python -m app.profile.purge

      # The other half of the retention promise (F8): a try-on render is deleted after its
      # TTL, and a job stranded 'running' by a dead worker is returned to the queue. Same
      # runner, same secret, same schedule — the sweep is retention, not rendering, so it
      # runs even while try-on is closed.
      - name: Sweep expired try-on renders
        if: steps.gate.outputs.configured == 'true'
        working-directory: services/api
        env:
          GYF_DATABASE_URL: ${{ secrets.GYF_PROD_DATABASE_URL }}
        run: uv run --extra postgres python -m app.tryon.worker --sweep
