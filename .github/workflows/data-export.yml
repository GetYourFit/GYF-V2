name: Data export

# Nightly flywheel harvest: turns the prod `interactions` spine into versioned
# training examples + an operator insight report (ml/pipelines/export_events.py)
# and publishes them as a workflow artifact. Read-only against the DB.
#
# Guarded like CD: no-ops gracefully until the secret is set, so the pipeline
# is green from day one and "turns on" once configured.
#
# Required repo secret:
#   GYF_PROD_DATABASE_URL — Supabase session-pooler URL, e.g.
#     postgresql://postgres.<ref>:<password>@aws-1-us-east-1.pooler.supabase.com:5432/postgres
#     (Supabase dashboard → Connect → Session pooler. The :6543 transaction
#     pooler also works for this read-only workload.)
#   GYF_CUELINKS_API_TOKEN (optional) — Cuelinks publisher API token; enables
#     the nightly conversions → purchase-events sync before the export.

on:
  schedule:
    - cron: "30 22 * * *" # nightly, 04:00 IST
  workflow_dispatch:
    inputs:
      backfill_limit:
        description: "Max items to embed this run (catch-up runs can go higher than the nightly default)"
        required: false
        default: "8000"
      skip_ingest:
        description: "Skip the Shopify catalog refresh (~65min) — for same-day repeat backfill-only catch-up runs"
        type: boolean
        required: false
        default: false

permissions:
  contents: read

jobs:
  export:
    name: Export interactions → training examples + report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check secret configured
        id: gate
        env:
          DSN: ${{ secrets.GYF_PROD_DATABASE_URL }}
        run: |
          if [ -z "$DSN" ]; then
            echo "GYF_PROD_DATABASE_URL not set — skipping (set the repo secret to activate)."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
          # Scheduled runs always ingest; manual runs can opt out for a fast backfill-only pass.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.skip_ingest }}" = "true" ]; then
            echo "run_ingest=false" >> "$GITHUB_OUTPUT"
          else
            echo "run_ingest=true" >> "$GITHUB_OUTPUT"
          fi
          echo "backfill_limit=${{ inputs.backfill_limit || '8000' }}" >> "$GITHUB_OUTPUT"

      - uses: astral-sh/setup-uv@v5
        if: steps.gate.outputs.configured == 'true'
        with:
          python-version: "3.12"

      - name: Refresh the Shopify merchant catalogs (real products, prices, stock)
        if: steps.gate.outputs.configured == 'true' && steps.gate.outputs.run_ingest == 'true'
        working-directory: services/api
        env:
          GYF_DATABASE_URL: ${{ secrets.GYF_PROD_DATABASE_URL }}
        run: uv run --extra postgres python -m app.catalog.ingest --provider shopify

      - name: Cache encoder weights
        if: steps.gate.outputs.configured == 'true'
        uses: actions/cache@v4
        with:
          path: ml/.hf-cache
          key: hf-cache-encoder-v1

      - name: Embed new items (perception backfill — idempotent, resumable)
        if: steps.gate.outputs.configured == 'true'
        working-directory: ml
        env:
          GYF_DATABASE_URL: ${{ secrets.GYF_PROD_DATABASE_URL }}
          # ZeroGPU is the primary lane for this slow overnight embed (no latency SLO, free
          # GPU). But a free Space may be out of quota/asleep — the backfill now demotes to
          # the local CPU SigLIP for the rest of the run rather than embedding nothing, and
          # reports which lane ran in the step summary. CPU must be pinned: MPS returns
          # non-unit SigLIP embeddings, and the fallback path must stay in the same space.
          GYF_ENCODER_REMOTE_URL: ${{ secrets.GYF_ENCODER_REMOTE_URL }}
          GYF_PERCEPTION_DEVICE: cpu
          GYF_HF_TOKEN: ${{ secrets.GYF_HF_TOKEN }}
          HF_HOME: ${{ github.workspace }}/ml/.hf-cache
        # No `continue-on-error`: the backfill exits non-zero when items are pending but zero
        # were embedded, and that MUST turn the run red — a silent no-op is the whole failure
        # this step was rewritten to end.
        run: |
          uv run --extra postgres --extra remote --extra perception \
            python -m pipelines.backfill --limit ${{ steps.gate.outputs.backfill_limit }}

      - name: Backfill the gender facet (text rules + zero-shot over embeddings)
        # Runs AFTER embedding so the zero-shot fallback has vectors for items the
        # merchant-text rules can't gender. Without this, gender is set only at ingest
        # from title words (misses many), most items stay NULL-gender, and the soft
        # gender filter (NULL passes for everyone) surfaces a mixed-gender feed. This
        # is the real-data fix for that — idempotent, resumable, safe to re-run.
        if: steps.gate.outputs.configured == 'true'
        working-directory: ml
        env:
          GYF_DATABASE_URL: ${{ secrets.GYF_PROD_DATABASE_URL }}
          GYF_ENCODER_REMOTE_URL: ${{ secrets.GYF_ENCODER_REMOTE_URL }}
          GYF_HF_TOKEN: ${{ secrets.GYF_HF_TOKEN }}
          HF_HOME: ${{ github.workspace }}/ml/.hf-cache
        run: |
          uv run --extra postgres --extra remote --extra perception \
            python -m pipelines.backfill_gender

      - name: Sync Cuelinks conversions into the spine
        if: steps.gate.outputs.configured == 'true'
        env:
          GYF_DATABASE_URL: ${{ secrets.GYF_PROD_DATABASE_URL }}
          GYF_CUELINKS_API_TOKEN: ${{ secrets.GYF_CUELINKS_API_TOKEN }}
        run: |
          if [ -z "$GYF_CUELINKS_API_TOKEN" ]; then
            echo "GYF_CUELINKS_API_TOKEN not set — skipping conversions sync."
          else
            uv run --with 'psycopg[binary]' python scripts/sync_conversions.py
          fi

      - name: Run export
        if: steps.gate.outputs.configured == 'true'
        working-directory: ml
        env:
          GYF_DATABASE_URL: ${{ secrets.GYF_PROD_DATABASE_URL }}
        run: uv run --extra postgres python -m pipelines.export_events

      - name: Upload dataset + report
        if: steps.gate.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gyf-data-export
          path: ml/data/exports/
          if-no-files-found: warn
          retention-days: 90

      - name: Surface the report in the run summary
        if: steps.gate.outputs.configured == 'true'
        run: |
          report=$(ls -d ml/data/exports/*/report.md 2>/dev/null | sort | tail -1)
          if [ -n "$report" ]; then cat "$report" >> "$GITHUB_STEP_SUMMARY"; fi
