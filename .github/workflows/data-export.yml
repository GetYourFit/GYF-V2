name: Data export

# Nightly flywheel harvest: turns the prod `interactions` spine into versioned
# training examples + an operator insight report (ml/pipelines/export_events.py)
# and publishes them as a workflow artifact. Read-only against the DB.
#
# Guarded like CD: no-ops gracefully until the secret is set, so the pipeline
# is green from day one and "turns on" once configured.
#
# Required repo secret:
#   GYF_PROD_DATABASE_URL — Supabase session-pooler URL, e.g.
#     postgresql://postgres.<ref>:<password>@aws-1-us-east-1.pooler.supabase.com:5432/postgres
#     (Supabase dashboard → Connect → Session pooler. The :6543 transaction
#     pooler also works for this read-only workload.)
#   GYF_CUELINKS_API_TOKEN (optional) — Cuelinks publisher API token; enables
#     the nightly conversions → purchase-events sync before the export.

on:
  schedule:
    - cron: "30 22 * * *" # nightly, 04:00 IST
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    name: Export interactions → training examples + report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check secret configured
        id: gate
        env:
          DSN: ${{ secrets.GYF_PROD_DATABASE_URL }}
        run: |
          if [ -z "$DSN" ]; then
            echo "GYF_PROD_DATABASE_URL not set — skipping (set the repo secret to activate)."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: astral-sh/setup-uv@v5
        if: steps.gate.outputs.configured == 'true'
        with:
          python-version: "3.12"

      - name: Refresh the Shopify merchant catalogs (real products, prices, stock)
        if: steps.gate.outputs.configured == 'true'
        working-directory: services/api
        env:
          GYF_DATABASE_URL: ${{ secrets.GYF_PROD_DATABASE_URL }}
        run: uv run --extra postgres python -m app.catalog.ingest --provider shopify

      - name: Cache encoder weights
        if: steps.gate.outputs.configured == 'true'
        uses: actions/cache@v4
        with:
          path: ml/.hf-cache
          key: hf-cache-encoder-v1

      - name: Embed new items (perception backfill — idempotent, resumable)
        if: steps.gate.outputs.configured == 'true'
        working-directory: ml
        env:
          GYF_DATABASE_URL: ${{ secrets.GYF_PROD_DATABASE_URL }}
          # Optional: remote ZeroGPU lane; unset → local CPU SigLIP baseline
          # (invariant #5 — a working baseline behind every port).
          GYF_ENCODER_REMOTE_URL: ${{ secrets.GYF_ENCODER_REMOTE_URL }}
          GYF_HF_TOKEN: ${{ secrets.GYF_HF_TOKEN }}
          HF_HOME: ${{ github.workspace }}/ml/.hf-cache
        run: |
          uv run --extra postgres --extra remote --extra perception \
            python -m pipelines.backfill --limit 3000

      - name: Sync Cuelinks conversions into the spine
        if: steps.gate.outputs.configured == 'true'
        env:
          GYF_DATABASE_URL: ${{ secrets.GYF_PROD_DATABASE_URL }}
          GYF_CUELINKS_API_TOKEN: ${{ secrets.GYF_CUELINKS_API_TOKEN }}
        run: |
          if [ -z "$GYF_CUELINKS_API_TOKEN" ]; then
            echo "GYF_CUELINKS_API_TOKEN not set — skipping conversions sync."
          else
            uv run --with 'psycopg[binary]' python scripts/sync_conversions.py
          fi

      - name: Run export
        if: steps.gate.outputs.configured == 'true'
        working-directory: ml
        env:
          GYF_DATABASE_URL: ${{ secrets.GYF_PROD_DATABASE_URL }}
        run: uv run --extra postgres python -m pipelines.export_events

      - name: Upload dataset + report
        if: steps.gate.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gyf-data-export
          path: ml/data/exports/
          if-no-files-found: warn
          retention-days: 90

      - name: Surface the report in the run summary
        if: steps.gate.outputs.configured == 'true'
        run: |
          report=$(ls -d ml/data/exports/*/report.md 2>/dev/null | sort | tail -1)
          if [ -n "$report" ]; then cat "$report" >> "$GITHUB_STEP_SUMMARY"; fi
