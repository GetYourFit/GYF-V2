name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  standards:
    name: Standards (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # ruff/ruff-format and prettier are covered by the api/web jobs; here we run
      # the repo-hygiene hooks (whitespace, EOF, large files, private keys, YAML/JSON).
      - run: pip install pre-commit
      - run: SKIP=prettier,ruff,ruff-format pre-commit run --all-files --show-diff-on-failure

  web:
    name: Web & packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1.30"
      - run: bun install
      - run: bun run format:check
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run build

  api:
    name: Core API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gyf
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      # Proves the behavioral event spine end-to-end against a real Postgres.
      GYF_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gyf
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.12
      - run: uv sync --extra dev --extra postgres --extra otel --extra sentry
      - name: Load schema
        run: psql "$GYF_TEST_DATABASE_URL" -v ON_ERROR_STOP=1 -f db/schema.sql
      - run: uv run ruff check .
      - run: uv run pytest -q
