name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  standards:
    name: Standards (pre-commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # ruff/ruff-format and prettier are covered by the api/web jobs; here we run
      # the repo-hygiene hooks (whitespace, EOF, large files, private keys, YAML/JSON).
      - run: pip install pre-commit
      - run: SKIP=prettier,ruff,ruff-format pre-commit run --all-files --show-diff-on-failure

  doctrine:
    name: Doctrine gates (license + ports)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Cleanup H0/H1: no tracked machine-local tool/cache artifacts or oversized binaries.
      - run: python -m unittest discover -s scripts -p "test_check_repo_hygiene.py"
      - run: python scripts/check_repo_hygiene.py
      # engineering-doctrine D2: no non-commercial model in the serving path.
      - run: python scripts/check_model_licenses.py
      # engineering-doctrine D5: no unevaluated model in the serving path.
      - run: python scripts/check_promotion.py
      # engineering-doctrine D1: the API layer imports no model package directly.
      - run: python scripts/check_ports.py

  web:
    name: Web & packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"
      - run: bun install --frozen-lockfile
      - run: bun run format:check
      - run: bun run typecheck
      - run: bun run lint
      - run: bun run test
      - run: bun run build

  flutter:
    name: Flutter app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gyf_app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.6"
          cache: true
      - run: flutter pub get
      - run: dart format --output=none --set-exit-if-changed lib test
      - run: flutter analyze
      - run: flutter test

  ml:
    name: ML platform
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.12
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run pytest -q

  api:
    name: Core API
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gyf
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      # Proves the behavioral event spine end-to-end against a real Postgres.
      GYF_TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/gyf
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.12
      - run: uv sync --extra dev --extra postgres --extra migrate --extra otel --extra sentry
      - name: Apply migrations
        # Build the schema from the Alembic migrations — the same source of truth
        # used in production — so CI can never drift from a hand-maintained dump.
        run: GYF_DATABASE_URL="$GYF_TEST_DATABASE_URL" uv run alembic upgrade head
      - run: uv run ruff check .
      - run: uv run pytest -q
