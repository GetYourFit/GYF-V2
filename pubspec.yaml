name: gyf_app
description: GYF — AI fashion stylist. Frontend-only Flutter app (UI, UX, design system, motion, haptics, accessibility).
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  go_router: ^14.6.2
  cached_network_image: ^3.4.1
  flutter_svg: ^2.0.16
  flutter_animate: ^4.5.2
  shared_preferences: ^2.3.4
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/illustrations/
    - assets/logos/
    - assets/onboarding/
    - assets/products/
    - assets/placeholders/
    - assets/avatars/
    - assets/animations/
