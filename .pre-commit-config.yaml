# Pre-commit hooks for GYF. Install once: `pip install pre-commit && pre-commit install --install-hooks`.
# `default_install_hook_types` below wires up both the commit and pre-push stages in that one command.
# Run on demand: `pre-commit run --all-files`. Mirrors the CI gate locally.
minimum_pre_commit_version: "3.5.0"
default_install_hook_types: [pre-commit, pre-push]
# Hooks without an explicit `stages` key fall back to every installed stage, so pin the
# default to pre-commit; the pre-push guard below overrides it with its own `stages`.
default_stages: [pre-commit]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # docs/vision/drafts/ are frozen raw idea inputs kept for history (see CLAUDE.md).
      - id: trailing-whitespace
        exclude: '^(ECC/|docs/vision/drafts/)'
      - id: end-of-file-fixer
        exclude: '^(ECC/|docs/vision/drafts/)'
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-yaml
        exclude: '^ECC/'
      - id: check-json
        exclude: '^(ECC/|.*tsconfig.*\.json$)'  # tsconfig allows comments (JSONC)
      - id: detect-private-key

  # Python (API + ML) — lint and format with Ruff.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: ["--fix"]
        files: '^(services/api|ml)/'
      - id: ruff-format
        files: '^(services/api|ml)/'

  # JS/TS/JSON/MD — format with Prettier via the workspace toolchain.
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: bun run format:check
        language: system
        pass_filenames: false
        files: '\.(ts|tsx|js|jsx|json|md)$'
        exclude: '^ECC/'

  # Pre-push safety net: mirror the CI format gate against the WHOLE tree, not just
  # staged files. This catches format drift that slipped in via `--no-verify`, a
  # rebase, or files touched after their commit — the exact way the gate silently
  # broke before. `bun run format:check` is the same command `make ci` runs first.
  - repo: local
    hooks:
      - id: prettier-format-check-push
        name: prettier format:check (full tree, pre-push)
        entry: bun run format:check
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
