[project]
name = "gyf-contracts"
version = "0.0.0"
description = "GYF shared domain contracts — canonical garment taxonomy shared by the API and the ML platform."
requires-python = ">=3.12"
dependencies = []

[tool.ruff]
line-length = 100
target-version = "py312"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["gyf_contracts"]
