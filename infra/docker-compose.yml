# Local development stack — the full P0 spine, no cloud accounts required.
# Usage: docker compose -f infra/docker-compose.yml up -d
#
# Mirrors the free-tier cloud topology (Supabase Postgres+pgvector, Upstash Redis,
# managed Redpanda/Kafka) so local and deployed environments stay at parity.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gyf
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../services/api/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda start
      - --smp 1
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://localhost:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ---- Application services (fully dockerized dev: the host needs no local venv/node_modules) ----

  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    working_dir: /app/services/api
    environment:
      GYF_DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gyf
      GYF_REDIS_URL: redis://redis:6379/0
      GYF_EVENT_BROKER_URL: redpanda:9092
      GYF_ENV: local
      GYF_AUTH_DISABLED: "true"
      GYF_MEDIA_DIR: /app/services/api/data/e2e/images
    ports:
      - "8000:8000"
    volumes:
      # Source bind-mounted for hot reload; the venv lives at /opt/venv (outside /app) so
      # these mounts never shadow installed dependencies.
      - ../services/api:/app/services/api
      - ../packages/contracts:/app/packages/contracts
      # Catalog images (seeded by scripts/e2e_workstream_a.sh) served read-only under /media.
      - ../data:/app/services/api/data:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: app/Dockerfile
    environment:
      NEXT_TELEMETRY_DISABLED: "1"
      # Browser-side calls hit the host-published API port.
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      # Bind only source — node_modules stays container-only (host darwin vs container linux
      # resolve different native binaries), so it is masked by named volumes below.
      - ../app:/repo/app
      - ../packages:/repo/packages
      - web_root_modules:/repo/node_modules
      - web_app_modules:/repo/app/node_modules
      - web_next_cache:/repo/app/.next
    depends_on:
      - api

volumes:
  pgdata:
  web_root_modules:
  web_app_modules:
  web_next_cache:
