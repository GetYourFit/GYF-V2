# GYF API — free-tier deployment blueprint (Render).
#
# Deploys the FastAPI service as a Docker web service on Render's free plan.
# The build context is the repo root (the API has an editable path dep on
# packages/contracts); the existing services/api/Dockerfile resolves deps into
# /opt/venv. We override the dev CMD (--reload + bind-mount assumptions) with a
# production uvicorn bound to Render's injected $PORT.
#
# Secrets (DB URL, JWT secret, allowed origins) are set in the Render dashboard
# or via `render` CLI — never committed (sync: false).
services:
  - type: web
    name: gyf-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./services/api/Dockerfile
    dockerContext: .
    # Exec form (Render word-splits this — no shell, so no $PORT expansion).
    # Bind a fixed port; Render auto-detects the open port. 8000 matches EXPOSE.
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: GYF_ENV
        value: production
      - key: GYF_AUTH_DISABLED
        value: "false"
      # Catalog images are served from a public Supabase Storage bucket (the
      # local /media mount is absent on Render), so image_url points at the CDN.
      - key: GYF_MEDIA_BASE_URL
        value: https://tabjvaatrikogutkrjom.supabase.co/storage/v1/object/public/catalog
      # Surface skin-tone + undertone estimates from photo onboarding. NOTE: this
      # is an OWNER-AUTHORIZED override of the fairness gate (the skin-tone module
      # has not yet passed the Monk Skin Tone eval — doctrine D6 / invariant #3).
      # The manual field is always the fallback and every value stays editable.
      # Revert to "false" (shadow) if needed; flip to the validated default once the
      # fairness eval passes.
      - key: GYF_SKIN_TONE_ENABLED
        value: "true"
      # Affiliate attribution (Cuelinks channel id — public, not a secret): every
      # buy link wraps through linksredirect.com deeplinks with a subid tying
      # conversions back to the recommendation that drove them. The API token
      # (secret, conversions sync only) lives in GitHub Actions, not here.
      - key: GYF_CUELINKS_CID
        value: "274785"
      # Photo onboarding runs the skin-tone + body-type modules on the remote HF
      # ZeroGPU Space (spaces/gyf-gpu) — the API host has no torch/pyfacer/SAM, so
      # WITHOUT these the modules abstain on every upload and onboarding shows
      # "couldn't read your features". Set all three in the dashboard (sync:false)
      # once the Space is deployed AND within quota (HF Pro). Value forms accepted:
      # a full https URL ("https://<owner>-gyf-gpu.hf.space") or the "owner/gyf-gpu"
      # Space id. A dead/cold Space makes the first call hang ~10s then abstain.
      #
      #   GYF_SKINTONE_REMOTE_URL = <Space url or owner/gyf-gpu>
      #   GYF_BODY_REMOTE_URL     = <same Space url or owner/gyf-gpu>
      #   GYF_HF_TOKEN            = <HF access token: gated SAM checkpoint + ZeroGPU quota>
      - key: GYF_SKINTONE_REMOTE_URL
        sync: false
      - key: GYF_BODY_REMOTE_URL
        sync: false
      - key: GYF_HF_TOKEN
        sync: false
      # Virtual try-on (M9): the licensed rendering lane. Set BOTH in the dashboard
      # once FASHN credits are purchased AND the D5 eval report is recorded (see
      # models.registry.json fashn-tryon-v1.6 notes). Unset = the endpoint abstains
      # honestly and the surface still works.
      #   GYF_TRYON_PROVIDER = fashn
      #   GYF_FASHN_API_KEY  = <fashn.ai → Settings → API>
      - key: GYF_TRYON_PROVIDER
        sync: false
      - key: GYF_FASHN_API_KEY
        sync: false
      # --- Secrets: set in dashboard / `render` CLI, not committed ---
      # The entrypoint runs `alembic upgrade head` on boot. DDL must NOT go through
      # the transaction pooler (:6543) — pgbouncer transaction mode breaks Alembic's
      # locks/prepared statements. Use the :5432 session connection here (runtime
      # queries work over it too on free tier). A fresh Supabase DB also needs the
      # catalog ingested after migrating, or /outfits/recommend returns nothing.
      - key: GYF_DATABASE_URL # Supabase connection (use :5432 session URL for migrations)
        sync: false
      # Auth: modern Supabase signs ES256 — verified against the project JWKS, which
      # is PREFERRED over the legacy HS256 secret (see app/auth.py + config.py). This
      # is the PUBLIC project URL (not a secret — same one the web uses), so pin it
      # here: without it, ES256 tokens fail with "no JWKS source configured".
      - key: GYF_SUPABASE_URL # public project URL — enables JWKS (ES256) verification
        value: https://tabjvaatrikogutkrjom.supabase.co
      - key: GYF_SUPABASE_JWT_SECRET # legacy HS256 fallback (Settings → API → JWT Secret)
        sync: false
      # The web origin is the Vercel deployment (project gyf-v2-app). Update this
      # to the custom domain once attached so CORS lets the browser in.
      # Comma-separate to allow several origins (e.g. preview + production).
      - key: GYF_ALLOWED_ORIGINS # the web origin (public, not a secret) — exact, no trailing slash
        value: https://gyf-v2-app.vercel.app

  # The web (Next.js) is deployed on Vercel (project gyf-v2-app), not Render —
  # Vercel's Git integration auto-deploys app/ on push; see vercel.json.
