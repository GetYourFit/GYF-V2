# GYF API — paid always-on deployment blueprint (Render).
#
# Deploys the FastAPI service as a Docker web service on Render Starter.
# The build context is the repo root (the API has an editable path dep on
# packages/contracts); the existing services/api/Dockerfile resolves deps into
# /opt/venv. We override the dev CMD (--reload + bind-mount assumptions) with a
# production uvicorn bound to Render's injected $PORT.
#
# Secrets (DB URL, JWT secret, allowed origins) are set in the Render dashboard
# or via `render` CLI — never committed (sync: false).
services:
  - type: web
    name: gyf-api
    runtime: docker
    # Existing owner-paid service. Owner decision 2026-07-16: retain Oregon and do
    # not create a Singapore migration plan.
    plan: starter
    region: oregon
    dockerfilePath: ./services/api/Dockerfile
    dockerContext: .
    # Exec form (Render word-splits this — no shell, so no $PORT expansion).
    # Bind a fixed port; Render auto-detects the open port. 8000 matches EXPOSE.
    # IMPORTANT: dockerCommand replaces the image ENTRYPOINT too, so run the
    # migrate entrypoint explicitly — otherwise `alembic upgrade head` never
    # runs on Render and the schema silently falls behind (this stranded prod
    # at 0005 and 500'd /social/follows: no `follows` table).
    dockerCommand: /app/services/api/docker-entrypoint.sh uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: GYF_ENV
        value: production
      - key: GYF_AUTH_DISABLED
        value: "false"
      # Behavioral event sink. MUST be "postgres" in prod: the default "local"
      # writes JSONL to Render's EPHEMERAL disk, wiped on every deploy — so the
      # learning flywheel (saves/skips/carts/clicks, the compounding moat + the
      # B2B data product) would silently capture NOTHING. Postgres persists to the
      # `interactions` spine (migrations 0001/0003) over GYF_DATABASE_URL. Not a
      # secret — a routing choice, so pinned here in version control, not the
      # dashboard, to make the launch-critical default impossible to forget.
      - key: GYF_EVENT_SINK
        value: postgres
      # The seeded browse index is the production cold-start path. The legacy
      # hash-sort query exceeded statement_timeout on the live catalogue.
      # Set false to roll back if the indexed query ever regresses.
      - key: GYF_BROWSE_INDEXED_RING_ENABLED
        value: "true"
      # Catalog images are served from a public Supabase Storage bucket (the
      # local /media mount is absent on Render), so image_url points at the CDN.
      - key: GYF_MEDIA_BASE_URL
        value: https://tabjvaatrikogutkrjom.supabase.co/storage/v1/object/public/catalog
      # Surface skin-tone + undertone estimates from photo onboarding. NOTE: this
      # is an OWNER-AUTHORIZED override of the fairness gate (the skin-tone module
      # has not yet passed the Monk Skin Tone eval — doctrine D6 / invariant #3).
      # The manual field is always the fallback and every value stays editable.
      # Revert to "false" (shadow) if needed; flip to the validated default once the
      # fairness eval passes.
      # RE-SHADOWED 2026-07-05: the earlier "true" override predates skin tone
      # becoming a RANKING signal (ce61dac). With the fairness eval failing hard
      # (max_band_gap 3.2 vs ≤1.0; per-band MAE up to 5.4/10 MST buckets), a
      # photo-derived tone would now steer picks with near-random data. Manual
      # skin tone still conditions ranking. Flip back once the eval passes.
      # Keep photo-derived skin tone shadowed while the fairness gate fails.
      # Manual skin tone remains live and continues to condition ranking.
      # Enable only after the full-MST fairness report passes the registry gate.
      - key: GYF_SKIN_TONE_ENABLED
        value: "false"
      # Affiliate attribution (Cuelinks channel id — public, not a secret): every
      # buy link wraps through linksredirect.com deeplinks with a subid tying
      # conversions back to the recommendation that drove them. The API token
      # (secret, conversions sync only) lives in GitHub Actions, not here.
      - key: GYF_CUELINKS_CID
        value: "274785"
      # --- Encoder lane (F2.5: kill the cold-GPU search path) ---
      # /items/search embeds the query text through the encoder port. Two lanes:
      #   gradio (default) = HF ZeroGPU Space — cold start measured at 29.7 s from
      #     India on 2026-07-14. Keep it for the image-embed batch backfill only.
      #   http = the Modal CPU text lane (ml/serving/modal_encoder.py): scale-to-zero,
      #     seconds-cold, inside Modal's free credits. See docs/deploy/gpu-lane.md.
      # In front of BOTH sits the Postgres query-embedding cache (migration 0016), so a
      # Repeated queries never re-embed. The URL is the deployed Modal web function;
      # only the bearer key remains secret-managed in Render.
      - key: GYF_ENCODER_REMOTE_KIND
        value: http
      - key: GYF_ENCODER_REMOTE_URL
        value: https://gyf1ltd--gyf-encoder-encoder-web.modal.run
      - key: GYF_ENCODER_REMOTE_KEY
        sync: false
      # Sentry project DSN (Settings → Projects → gyf-api → Client Keys).
      # The API already initializes Sentry only when this is present.
      - key: GYF_SENTRY_DSN
        sync: false
      # Keep production performance telemetry useful without tracing every request.
      - key: GYF_TRACE_SAMPLE_RATE
        value: "0.1"
      # Runtime uses Supabase transaction pooling (6543); keep the pool small
      # because the free Supabase project exposes only 15 session clients.
      - key: GYF_DB_POOL_MAX_SIZE
        value: "3"
      # Virtual try-on (M9): the licensed rendering lane. Primary pick (2026-07-06
      # license/infra research pass, see models.registry.json fal-leffa-vto-v1
      # notes): fal.ai hosting Leffa (MIT-licensed, independently verified — not
      # just badge-trusted). Set both once fal credits are purchased AND the D5
      # eval report is recorded. Unset = the endpoint abstains honestly and the
      # surface still works.
      #   GYF_TRYON_PROVIDER = fal-leffa
      #   GYF_FAL_API_KEY    = <fal.ai dashboard → Keys>
      # Alternate lane: GYF_TRYON_PROVIDER=fashn + GYF_FASHN_API_KEY.
      - key: GYF_TRYON_PROVIDER
        sync: false
      - key: GYF_FAL_API_KEY
        sync: false
      - key: GYF_FASHN_API_KEY
        sync: false
      # --- Secrets: set in dashboard / `render` CLI, not committed ---
      # The entrypoint runs `alembic upgrade head` on boot. The current service
      # is a singleton; before adding replicas, move migrations to one serialized
      # release job so multiple booting instances never race the same DDL. Runtime
      # queries use the transaction pooler (:6543); migrations use the separate
      # :5432 session URL below. A fresh Supabase DB also needs the
      # catalog ingested after migrating, or /outfits/recommend returns nothing.
      - key: GYF_DATABASE_URL # Supabase connection (use :5432 session URL for migrations)
        sync: false
      - key: GYF_MIGRATION_DATABASE_URL # optional :5432 session URL; runtime GYF_DATABASE_URL should use :6543
        sync: false
      # Auth: modern Supabase signs ES256 — verified against the project JWKS, which
      # is PREFERRED over the legacy HS256 secret (see app/auth.py + config.py). This
      # is the PUBLIC project URL (not a secret — same one the web uses), so pin it
      # here: without it, ES256 tokens fail with "no JWKS source configured".
      - key: GYF_SUPABASE_URL # public project URL — enables JWKS (ES256) verification
        value: https://tabjvaatrikogutkrjom.supabase.co
      - key: GYF_SUPABASE_JWT_SECRET # legacy HS256 fallback (Settings → API → JWT Secret)
        sync: false
      # Service-role key (Settings → API → service_role). Used for exactly one thing:
      # deleting a purged account's avatar objects. The avatars bucket is public and its
      # RLS is scoped to auth.uid(), so an erased account has no token left to delete its
      # own image — without this key a deleted user's face stays publicly readable
      # forever, and the nightly purge defers (keeps the tombstone) rather than
      # half-erasing the account. Absent = /system/status reports profile_avatar
      # degraded and the client shows initials instead of soliciting a picture it could
      # not later remove. Secret: never expose to a client, never log.
      - key: GYF_SUPABASE_SERVICE_ROLE_KEY
        sync: false
      # The web origin is the Vercel deployment (project gyf-v2-app). Update this
      # to the custom domain once attached so CORS lets the browser in.
      # Comma-separate to allow several origins (e.g. preview + production).
      - key: GYF_ALLOWED_ORIGINS # the web origin (public, not a secret) — exact, no trailing slash
        value: https://gyf-v2-app.vercel.app,https://get-your-fit.expo.app

  # The web (Next.js) is deployed on Vercel (project gyf-v2-app), not Render —
  # Vercel's Git integration auto-deploys app/ on push; see vercel.json.
